<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linuv Settings</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #58a6ff;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 8px;
            background: #2d2d2d;
            color: #d4d4d4;
            border: 1px solid #3e3e3e;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        select:hover {
            border-color: #58a6ff;
        }

        select:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .status {
            padding: 8px;
            background: #0d1117;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #1a472a;
            color: #3fb950;
        }

        .info {
            font-size: 12px;
            color: #8b949e;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #3e3e3e;
        }

        .info a {
            color: #58a6ff;
            text-decoration: none;
        }

        .info a:hover {
            text-decoration: underline;
        }

        .theme-preview {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .theme-option {
            padding: 8px;
            background: #2d2d2d;
            border: 2px solid #3e3e3e;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .theme-option:hover {
            border-color: #58a6ff;
        }

        .theme-option.selected {
            border-color: #58a6ff;
            background: #1a3a52;
        }
    </style>
</head>

<body>
    <h2>⚙️ Linuv Settings</h2>

    <div class="section">
        <label for="theme">Theme</label>
        <select id="theme">
            <option value="github-dark">GitHub Dark</option>
            <option value="github-light">GitHub Light</option>
            <option value="solarized-dark">Solarized Dark</option>
            <option value="solarized-light">Solarized Light</option>
            <option value="nord">Nord</option>
            <option value="dracula">Dracula</option>
            <option value="monokai">Monokai</option>
            <option value="high-contrast">High Contrast</option>
        </select>
    </div>

    <div class="section">
        <div class="checkbox-container">
            <input type="checkbox" id="offlineMode">
            <label for="offlineMode" style="margin: 0;">Offline Mode</label>
        </div>
    </div>

    <div class="status" id="status">Settings saved!</div>

    <div class="info">
        <strong>Note:</strong> To view local .md files, enable "Allow access to file URLs" in Chrome extensions
        settings.
        <br><br>
        <a href="https://github.com/yourusername/linuv" target="_blank">Documentation</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
